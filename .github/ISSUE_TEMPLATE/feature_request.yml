name: Feature request
description: Suggest a new behavior or option.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. "When X, I want Y because Z."
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed approach (optional)
      description: If you have an idea for how to solve it, sketch it here.

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround (optional)
